baseURL = 'https://noveljeans.com/'
languageCode = 'en-us'
title = 'courtnicles blog'
theme = 'vintage-web-hugo-theme'

# Pagination
[pagination]
  pagerSize = 10
  path = "page"

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 10

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 20

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 30

# Theme Parameters
[params]
  # Site Description
  description = "A nostalgic journey through the early web"
  author = "Courtney Nguyen"

  # Retro Features
  show_browser_chrome = false
  show_status_bar = false
  show_sidebar = false
  show_welcome_message = true
  welcome_message = "I SAID WELCOME TO MY SPECIAL PLACE MY NAME IS COURTNEY AND I'VE been chaotic every since I was born in 1994. Sometimes things were good and sometimes they were bad. This is my attempt to understand my life and document my legacy. Yes, it is but a very humble one. But I tried. It all started when I was born. I was born on a Monday football night. My dad wanted to finish watching the game but my mom needed to push me out. I was a bit of a premie and also my mom was never affectionate. I was a formula baby. I believe this is why I have trouble (or believe that I have trouble) feeling comfort in social interactions. Nevertheless i did alright overall with the cards that i've been dealt. I grew up in the one of the biggest Vietnamese diaspora populations in San Jose, CA. For a while it didn't mean a lot to me. And then it did but I found out later in my life when I was lost that when I said 'the war' people didn't automatically know which one I was talking about. So I knew it was time to figure it out and take life by my own hands. This site is kind of one of those attempts. I've found that I can do a lot if I just try. I also try my best to connect with most kinds of people so I hope that you don't find me insufferable. Feel free to reach out if you have any random inquiries. Or suggestions."

  # Content Display
  show_featured_sections = false
  show_stats = true
  show_retro_elements = false
  show_sharing = false

  # Footer Options
  show_retro_footer = false
  show_build_info = false

  # Sidebar Options
  show_sidebar_stats = false
  show_retro_sidebar = false
  sidebar_content = "dsadfs"

  # Social Links
  [params.social]
    github = "courtnicles"
    email = "courtneythnguyen@gmail.com"
    instagram = "courtnicles"

  # Repository (for edit links)
  repo_url = "https://github.com/username/repo"
  edit_page = true

[caches]
  [caches.images]
    dir    = ":cacheDir/images"
    maxAge = "1440h"
  [caches.getresource]
    dir    = ':cacheDir/:project'
    maxAge = "1h"